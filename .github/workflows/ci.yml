name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q app scripts

      - name: Deployment readiness check
        run: python scripts/check_deployment.py

      - name: UI smoke check
        run: python scripts/check_ui.py

      - name: Docker Compose config check
        run: docker compose config --quiet

      - name: Docker Compose HTTPS profile check
        run: APP_DOMAIN=example.com docker compose --profile https config --quiet
