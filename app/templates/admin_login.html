{% extends "base.html" %}
{% block content %}
<h1>Вход для администратора</h1>
<section class="panel">
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form class="stack-form" method="post" action="/admin-login">
    <input name="next" type="hidden" value="{{ next_url }}">
    <label class="wide">
      Пароль администратора
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        required
      >
    </label>
    <button class="wide" type="submit">Войти</button>
  </form>
</section>
<p><a class="button" href="/">Назад</a></p>
{% endblock %}
